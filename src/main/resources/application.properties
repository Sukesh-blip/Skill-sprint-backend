spring.application.name=SKILL-SPRINT-BACKEND
server.port=${PORT:9090}

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/skillsprint?useSSL=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:@sukesh07}

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Security Configuration
app.jwt.secret=${JWT_SECRET:skillsprint-super-secure-and-ultra-long-secret-key-2026}
app.admin.key=${ADMIN_REGISTRATION_KEY:SKILL_SPRINT_ADMIN_2026}

# Logging
logging.level.org.springframework.web=INFO
